name: Build & deploy blueprint

on:
  push: { branches: [main] }
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency: { group: pages, cancel-in-progress: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- 1. Build the KMP transpiler (shared core -> JVM CLI) ---
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4
      - name: Test and build transpiler
        run: cd tool && gradle jvmTest jvmJar --no-daemon

      # --- 2. Resolve MyST -> AST JSON (xrefs & numbering baked in) ---
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Install mystmd
        run: npm install -g mystmd
      - name: Resolve MyST AST
        run: cd site/myst && myst build --site

      # --- 3. Transpile AST -> MDX into Starlight ---
      - name: Transpile to MDX
        run: |
          java -jar tool/build/libs/*-jvm.jar \
            --in site/myst/_build/site/content \
            --out site/src/content/docs \
            --base /myst-starlight-blueprint

      # --- 4. Export MyST -> PDF (Typst, no LaTeX needed) and merge each page's
      #        export into one downloadable file. Must run before the site build
      #        below, since Astro copies site/public/ verbatim into site/dist/. ---
      - uses: typst-community/setup-typst@v3
      - name: Install qpdf
        run: sudo apt-get update && sudo apt-get install -y qpdf
      - name: Export and merge PDF
        run: |
          cd site/myst
          # One file per invocation, not `myst build --typst index.md tool.md`:
          # a same-run first-time template download races across files and can
          # fail with "invalid template.yml" — this is a clean checkout every
          # CI run, so the race would hit every time, not just occasionally.
          myst build --typst index.md --force
          myst build --typst tool.md --force
          mkdir -p ../public
          qpdf --empty --pages exports/index.pdf exports/tool.pdf -- ../public/blueprint.pdf

      # --- 5. Build Starlight. `astro build` compiles every MDX file, so this
      #        step IS the MDX compile gate — invalid generated MDX fails here. ---
      - name: Build site (also the MDX compile gate)
        run: cd site && npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with: { path: site/dist }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: '${{ steps.deployment.outputs.page_url }}' }
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
