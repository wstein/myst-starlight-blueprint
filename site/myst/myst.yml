version: 1
project:
  title: MyST → Starlight Blueprint
  description: A self-rendering blueprint and template.
  toc:
    - file: index.md
    - file: tool.md
site:
  # `myst build --site` always resolves and downloads a real site template —
  # there is no "skip the theme" option — even though we only consume the
  # resolved AST JSON under _build/site/content/ and never render this
  # template's own output; the transpiler feeds Starlight instead.
  template: book-theme
